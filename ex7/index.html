<div id="app">
  <input v-model="price" type="number" placeholder="原價" />
  <p>原價：{{ price }} 元</p>
  <p>打八折後：{{ discounted }} 元</p>
  <p>含稅（5%）：{{ withTax }} 元</p>
</div>

<script>
Vue.createApp({
  data() {
    return { price: 100 }
  },
  computed: {
    discounted() {
      return Math.round(this.price * 0.8)
    },
    withTax() {
      return Math.round(this.discounted * 1.05)
    }
  }
}).mount("#app")
</script>

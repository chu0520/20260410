    <title>0410 上課實作目錄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffb6d9 0%, #ff69b4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .exercises-list {
            display: grid;
            gap: 12px;
        }
        .exercise-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #fff0f6;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            border-left: 4px solid #ff69b4;
            transition: all 0.3s ease;
        }
        .exercise-item:hover {
            background: #ff69b4;
            color: white;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }
        .exercise-number {
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
            min-width: 40px;
        }
        .exercise-title {
            flex: 1;
            font-size: 16px;
        }
        .exercise-arrow {
            font-size: 20px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        .exercise-item:hover .exercise-arrow {
            opacity: 1;
        }
    </style>
</head>
